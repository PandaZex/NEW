<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    <link rel="stylesheet" href="/css/log.css/">
</head>
<body>
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Вход в систему</h2>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="username">Логин</label>
                    <input type="text" id="username" placeholder="Введите ваш логин">
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" placeholder="Введите ваш пароль">
                </div>
                <button class="btn btn-primary btn-block">ВХОД</button>
                <div class="form-links">
                    <a href="#" class="forgot-password">Забыли пароль?</a>
                    <a href="registr.html" class="switch-to-register">Регистрация</a>
                </div>
                <div class="social-login">
                    <p>Войти другим способом</p>
                    <div class="social-buttons">
                        <button class="social-btn"><i class="fab fa-google"></i></button>
                        <button class="social-btn"><i class="fab fa-vk"></i></button>
                        <button class="social-btn"><i class="fab fa-yandex"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
