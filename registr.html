<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <link rel="stylesheet" href="/css/reg.css/">
</head>
<body>
    <div class="modal" id="registerModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Регистрация</h2>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <p class="modal-subtitle">Уже есть аккаунт? <a href="login.html" class="switch-to-login">Вход</a></p>
                <div class="form-group">
                    <label for="email">Эл.почта, ваш будущий логин для входа</label>
                    <input type="email" id="email" placeholder="example@mail.ru">
                </div>
                <div class="form-group">
                    <label for="new-password">Придумайте пароль</label>
                    <input type="password" id="new-password" placeholder="Минимум 8 символов">
                </div>
                <div class="form-group">
                    <label for="confirm-password">Повторный пароль</label>
                    <input type="password" id="confirm-password" placeholder="Повторите пароль">
                </div>
                <button class="btn btn-primary btn-block">ЗАРЕГИСТРИРОВАТЬСЯ</button>
                <div class="terms">
                    <input type="checkbox" id="terms">
                    <label for="terms">Я согласен с условиями использования и политикой конфиденциальности</label>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
